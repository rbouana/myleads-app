name: myleads
description: "My Leads - Application mobile de gestion intelligente de contacts professionnels. Scannez. Connectez. Convertissez."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Local Storage
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3
  sqflite_common_ffi_web: ^0.4.3+1
  path_provider: ^2.1.3
  path: ^1.9.0

  # Security & Encryption
  encrypt: ^5.0.3
  crypto: ^3.0.5
  flutter_secure_storage: ^9.2.2

  # Authentication
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1

  # Camera & Scanning
  mobile_scanner: ^5.1.1
  google_mlkit_text_recognition: ^0.13.0
  nfc_manager: ^3.5.0
  image_picker: ^1.1.2

  # UI Components
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  iconsax: ^0.0.8
  lottie: ^3.1.2
  smooth_page_indicator: ^1.2.0+3

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  flutter_local_notifications: ^17.2.1

  # Payment
  in_app_purchase: ^3.2.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  # Assets will be added when needed
  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - assets/animations/
